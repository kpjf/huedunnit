<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 4x4 color grid fills entire canvas -->
  <!-- Row 1 -->
  <rect x="0"   y="0"   width="128" height="128" fill="#FF0000"/>
  <rect x="128" y="0"   width="128" height="128" fill="#0000FF"/>
  <rect x="256" y="0"   width="128" height="128" fill="#FFFF00"/>
  <rect x="384" y="0"   width="128" height="128" fill="#00CC00"/>
  <!-- Row 2 -->
  <rect x="0"   y="128" width="128" height="128" fill="#9933FF"/>
  <rect x="128" y="128" width="128" height="128" fill="#FF8800"/>
  <rect x="256" y="128" width="128" height="128" fill="#00FFFF"/>
  <rect x="384" y="128" width="128" height="128" fill="#FF00FF"/>
  <!-- Row 3 -->
  <rect x="0"   y="256" width="128" height="128" fill="#FFFF00"/>
  <rect x="128" y="256" width="128" height="128" fill="#FF0000"/>
  <rect x="256" y="256" width="128" height="128" fill="#9933FF"/>
  <rect x="384" y="256" width="128" height="128" fill="#FF8800"/>
  <!-- Row 4 -->
  <rect x="0"   y="384" width="128" height="128" fill="#00FFFF"/>
  <rect x="128" y="384" width="128" height="128" fill="#00CC00"/>
  <rect x="256" y="384" width="128" height="128" fill="#FF00FF"/>
  <rect x="384" y="384" width="128" height="128" fill="#0000FF"/>

  <!-- Dark overlay -->
  <rect x="0" y="0" width="512" height="512" fill="#000" opacity="0.28"/>

  <!-- Hash # logo centered in safe zone (center 80% = 51px inset each side) -->
  <!-- Left vertical bar -->
  <rect x="160" y="96"  width="64" height="320" rx="18" fill="white"/>
  <!-- Right vertical bar -->
  <rect x="288" y="96"  width="64" height="320" rx="18" fill="white"/>
  <!-- Top horizontal bar -->
  <rect x="96"  y="160" width="320" height="64" rx="18" fill="white"/>
  <!-- Bottom horizontal bar -->
  <rect x="96"  y="288" width="320" height="64" rx="18" fill="white"/>
</svg>
